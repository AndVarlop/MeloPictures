<div class="melo-bg">
  <div class="melo-confetti" aria-hidden="true">
    <span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span>
  </div>

  <nav class="sticky top-0 z-20">
    <div class="mx-auto flex max-w-5xl items-center justify-between px-4 py-3">
      <a [routerLink]="auth.user() ? '/gallery' : '/'" class="group flex items-center gap-2">
        <span
          class="grid h-11 w-11 place-items-center overflow-hidden rounded-2xl bg-white ring-2 ring-green-500 shadow-lg shadow-green-500/30 transition-transform group-hover:rotate-6 group-hover:scale-110">
          <img src="/marimonda.png" alt="Marimonda MeloPictures" class="h-10 w-10 object-contain melo-bounce" />
        </span>
        <div class="flex flex-col leading-tight">
          <span class="font-display text-xl font-extrabold melo-gradient-text">
            MeloPictures
          </span>
          <span class="text-[10px] font-semibold uppercase tracking-wider text-green-800/70">
            Barranquilla · Carnaval
          </span>
        </div>
      </a>

      <div
        class="flex items-center gap-1 rounded-full border border-green-200/70 bg-white/70 p-1 backdrop-blur-md shadow-sm">
        @if (auth.user()) {
        <a routerLink="/gallery" routerLinkActive="bg-white text-green-700 shadow"
          class="rounded-full px-3 py-1.5 text-sm font-semibold text-gray-700 transition hover:text-green-700">
          Explorar
        </a>
        <a routerLink="/upload" routerLinkActive="bg-white text-green-700 shadow"
          class="rounded-full px-3 py-1.5 text-sm font-semibold text-gray-700 transition hover:text-green-700">
          + Subir
        </a>
        <a routerLink="/dashboard" routerLinkActive="bg-white text-green-700 shadow"
          class="rounded-full px-3 py-1.5 text-sm font-semibold text-gray-700 transition hover:text-green-700">
          Perfil
        </a>
        <button type="button" (click)="logout()"
          class="rounded-full px-3 py-1.5 text-sm font-semibold text-gray-500 transition hover:text-red-600"
          title="Cerrar sesión">
          ↩
        </button>
        } @else {
        <a routerLink="/" routerLinkActive="bg-white text-green-700 shadow" [routerLinkActiveOptions]="{ exact: true }"
          class="rounded-full px-3 py-1.5 text-sm font-semibold text-gray-700 transition hover:text-green-700">
          Entrar
        </a>
        <a routerLink="/register" class="melo-btn px-4 py-1.5 text-sm">
          Registrarme
        </a>
        }
      </div>
    </div>
    <div class="melo-ribbon mx-auto max-w-5xl"></div>
  </nav>

  <main class="relative z-10">
    <router-outlet />
  </main>

  <footer class="relative z-10 mx-auto mt-16 max-w-5xl px-4 py-8 text-center">
    <div class="melo-ribbon mx-auto mb-4 w-32"></div>
    <p class="text-xs text-gray-600">
      Hecho con 🎭 en <span class="font-semibold text-green-700">Barranquilla</span> ·
      <span class="melo-gradient-text font-semibold">MeloPictures</span> · {{ year }}
    </p>
    <p class="mt-1 text-[11px] text-gray-500">
      Carnaval · Junior · Río Magdalena · ¡Quien lo vive es quien lo goza!
    </p>
  </footer>
</div>
